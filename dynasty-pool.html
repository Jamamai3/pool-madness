<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Madness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #D72B2B;
      --red-dark: #A51E1E;
      --red-glow: rgba(215,43,43,0.25);
      --black: #0D0D0D;
      --surface: #161616;
      --surface2: #1F1F1F;
      --surface3: #2A2A2A;
      --border: #333;
      --text: #F0F0F0;
      --muted: #888;
      --green: #22C55E;
      --amber: #F59E0B;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ===== NAV ===== */
    nav {
      background: var(--surface);
      border-bottom: 2px solid var(--red);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      height: 44px;
      width: auto;
    }

    .nav-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
    }

    .nav-title span { color: var(--red); }

    .nav-links {
      display: flex;
      gap: 0.25rem;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--text);
      background: var(--surface3);
    }

    .nav-btn.active { color: var(--red); }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--red);
    }

    .nav-balance {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--green);
      letter-spacing: 0.05em;
    }

    .nav-balance.negative { color: var(--red); }

    .btn-logout {
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }

    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(215,43,43,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(215,43,43,0.08) 0%, transparent 50%),
        var(--black);
      gap: 2rem;
      padding: 2rem;
    }

    .login-logo {
      width: min(300px, 70vw);
      filter: drop-shadow(0 0 40px rgba(215,43,43,0.4));
    }

    .login-tagline {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-google {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 2px solid var(--red);
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.8rem 2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--red-glow);
    }

    .btn-google:hover {
      background: var(--red);
      box-shadow: 0 0 30px var(--red-glow);
      transform: translateY(-1px);
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ===== VIEWS ===== */
    .view { display: none; }
    .view.active { display: block; }

    /* ===== PAGE HEADER ===== */
    .page-header {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .page-title span { color: var(--red); }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 5px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--red);
      color: #fff;
    }

    .btn-primary:hover { background: var(--red-dark); }

    .btn-secondary {
      background: var(--surface3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--muted); }

    .btn-ghost {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      background: rgba(215,43,43,0.15);
      color: var(--red);
      border: 1px solid var(--red-dark);
    }

    .btn-danger:hover { background: var(--red); color: #fff; }

    .btn-success {
      background: rgba(34,197,94,0.15);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.4);
    }

    .btn-success:hover { background: var(--green); color: #000; }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-sm {
      padding: 0.35rem 0.75rem;
      font-size: 0.82rem;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    /* ===== SESSION CARDS ===== */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .session-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--border);
    }

    .session-card.open::before { background: var(--green); }
    .session-card.upcoming::before { background: var(--amber); }
    .session-card.closed::before { background: var(--muted); }
    .session-card.completed::before { background: var(--surface3); }
    .session-card.cancelled::before { background: var(--red); }
    .session-card.cancelled { border-color: var(--red-dark); opacity: 0.8; }

    .session-card:hover { border-color: var(--muted); }

    .session-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .session-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .tag-status-open { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag-status-upcoming { background: rgba(245,158,11,0.15); color: var(--amber); }
    .tag-status-closed { background: var(--surface3); color: var(--muted); }
    .tag-status-completed { background: var(--surface3); color: var(--muted); }
    .tag-status-cancelled { background: rgba(215,43,43,0.15); color: var(--red); }
    .tag-cost { background: var(--surface3); color: var(--text); }
    .tag-location { background: var(--surface3); color: var(--text); }
    .tag-waitlist { background: rgba(245,158,11,0.15); color: var(--amber); }
    .tag-registered { background: rgba(34,197,94,0.15); color: var(--green); }

    /* ===== PLAYERS LIST ===== */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .player-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.35rem 0.6rem;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      overflow: hidden;
    }

    .player-chip-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--surface3);
    }

    .player-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chip.waitlist {
      opacity: 0.6;
      border-style: dashed;
    }

    /* ===== SPOTS BAR ===== */
    .spots-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .spots-track {
      flex: 1;
      height: 6px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
    }

    .spots-fill {
      height: 100%;
      background: var(--red);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .spots-fill.almost { background: var(--amber); }
    .spots-fill.available { background: var(--green); }

    .spots-text {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 500;
    }

    /* ===== SOLDE WIDGET ===== */
    .balance-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .balance-amount {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      color: var(--green);
    }

    .balance-amount.negative { color: var(--red); }
    .balance-amount.zero { color: var(--muted); }

    .balance-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ===== TRANSACTIONS TABLE ===== */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--surface2);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .tx-debit { color: var(--red); font-weight: 600; }
    .tx-credit { color: var(--green); font-weight: 600; }

    /* ===== ADMIN SECTION ===== */
    .admin-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .admin-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }

    .admin-tab.active {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    .admin-tab:hover { color: var(--text); }

    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.5rem;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 5px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    /* ===== ALERTS ===== */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .alert-warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); }
    .alert-error { background: rgba(215,43,43,0.12); border: 1px solid rgba(215,43,43,0.3); color: var(--red); }
    .alert-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .alert-info { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    /* ===== LOADING ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      gap: 0.75rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--surface3);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ===== BADGE ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--red);
      color: #fff;
    }

    /* ===== DIVIDER ===== */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.toast-success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    #toast.toast-error { border-color: rgba(215,43,43,0.4); color: var(--red); }

    /* ===== EMAIL AUTH ===== */
    .auth-tabs {
      display: flex;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem;
      cursor: pointer;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    .auth-tab.active { color: var(--red); border-bottom-color: var(--red); }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 380px;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }
    .btn-email {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
      margin-top: 0.75rem;
    }
    .btn-email:hover { border-color: var(--muted); }

    /* ===== BOTTOM NAV MOBILE ===== */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 2px solid var(--border);
      z-index: 100;
      padding: 0.4rem 0 calc(0.4rem + env(safe-area-inset-bottom));
    }
    .bottom-nav-inner {
      display: flex;
      justify-content: space-around;
    }
    .bottom-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.3rem 1.25rem;
      transition: color 0.15s;
    }
    .bottom-nav-btn.active { color: var(--red); }
    .bottom-nav-btn svg { width: 22px; height: 22px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      nav { padding: 0 0.75rem; height: 52px; }
      .nav-links { display: none; }
      .nav-title { font-size: 1.05rem; }
      .nav-logo { height: 32px; }
      .nav-balance { font-size: 0.85rem; }
      .btn-logout { font-size: 0.7rem; padding: 0.2rem 0.5rem; }
      .bottom-nav { display: block; }
      main { padding: 1rem 0.75rem 5rem; }
      .form-row { grid-template-columns: 1fr; }
      .balance-amount { font-size: 1.75rem; }
      .page-header { flex-wrap: wrap; gap: 0.5rem; }
      .page-title { font-size: 1.4rem; }
      .session-card { padding: 1rem; }
      .session-header { flex-direction: column; gap: 0.5rem; }
      .players-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .admin-tabs { overflow-x: auto; white-space: nowrap; flex-wrap: nowrap; padding-bottom: 1px; }
      .admin-tab { flex-shrink: 0; }
      .table-wrap { -webkit-overflow-scrolling: touch; }
      table { min-width: 380px; }
      .modal { padding: 1.1rem; }
      .modal-title { font-size: 1.2rem; }
      .balance-widget { flex-wrap: wrap; gap: 0.75rem; }
      .login-logo { width: min(200px, 55vw); }
      .btn-google { font-size: 0.9rem; padding: 0.65rem 1.1rem; }
      .auth-box { padding: 1.1rem; }
    }
  </style>
</head>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { 
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
    createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import {
    getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc,
    query, where, orderBy, onSnapshot, serverTimestamp, increment, runTransaction,
    Timestamp, limit
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // ⚠️ REMPLACE AVEC TA CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAHUOT3IZ_8bMCEXGYrhLzvh2ysR02A6gU",
    authDomain: "pickleball-madness.firebaseapp.com",
    projectId: "pickleball-madness",
    storageBucket: "pickleball-madness.firebasestorage.app",
    messagingSenderId: "1016041509380",
    appId: "1:1016041509380:web:2cfb1dfaa590e3e1bedb51"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ===== STATE =====
  let currentUser = null;
  let currentUserData = null;
  let editingSessionId = null;

  // ===== AUTH =====
  // ===== AUTH TAB TOGGLE =====
  window.showAuthTab = (tab) => {
    document.getElementById('auth-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('auth-register').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.auth-tab').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  };

  // ===== EMAIL LOGIN =====
  window.loginWithEmail = async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = 'Courriel et mot de passe requis.'; errEl.style.display = 'block'; return; }
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      const msgs = {
        'auth/user-not-found': 'Aucun compte avec ce courriel.',
        'auth/wrong-password': 'Mot de passe incorrect.',
        'auth/invalid-email': 'Courriel invalide.',
        'auth/too-many-requests': 'Trop de tentatives. Réessaie plus tard.',
        'auth/invalid-credential': 'Courriel ou mot de passe incorrect.'
      };
      errEl.textContent = msgs[e.code] || 'Erreur: ' + e.message;
      errEl.style.display = 'block';
    }
  };

  // ===== EMAIL REGISTER =====
  window.registerWithEmail = async () => {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl = document.getElementById('reg-error');
    errEl.style.display = 'none';
    if (!name || !email || !password) { errEl.textContent = 'Tous les champs sont requis.'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Mot de passe: minimum 6 caractères.'; errEl.style.display = 'block'; return; }
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(result.user, { displayName: name });
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use': 'Ce courriel est déjà utilisé.',
        'auth/invalid-email': 'Courriel invalide.',
        'auth/weak-password': 'Mot de passe trop faible.'
      };
      errEl.textContent = msgs[e.code] || 'Erreur: ' + e.message;
      errEl.style.display = 'block';
    }
  };

  window.loginWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      // User doc créé dans onAuthStateChanged
    } catch(e) {
      toast('Erreur de connexion: ' + e.message, 'error');
    }
  };

  window.logout = async () => {
    await signOut(auth);
    location.reload();
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      // Créer/récupérer le doc user
      const userRef = doc(db, 'users', user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL,
          role: 'player',
          balance: 0,
          active: true,
          createdAt: serverTimestamp()
        });
      }
      currentUserData = (await getDoc(userRef)).data();

      // UI
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      
      const avatar = document.getElementById('nav-avatar');
      if (user.photoURL) {
        avatar.src = user.photoURL;
        avatar.style.display = 'block';
      }

      if (currentUserData.role === 'admin') {
        document.getElementById('nav-admin').style.display = 'block';
        document.getElementById('bnav-admin').style.display = 'flex';
      }

      updateNavBalance(currentUserData.balance);
      loadSessions();
      loadProfile();
      autoCompletePastSessions();

    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });

  // ===== NAVIGATION =====
  window.showView = (view) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav-' + view);
    if (btn) btn.classList.add('active');
    // Bottom nav
    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
    const bnav = document.getElementById('bnav-' + view);
    if (bnav) bnav.classList.add('active');

    if (view === 'sessions') loadSessions();
    if (view === 'profile') loadProfile();
    if (view === 'admin') loadAdmin();
  };

  // ===== BALANCE =====
  function updateNavBalance(balance) {
    const el = document.getElementById('nav-balance-display');
    el.textContent = formatCurrency(balance);
    el.className = 'nav-balance' + (balance < 0 ? ' negative' : '');
  }

  function formatCurrency(n) {
    const val = Number(n) || 0;
    return (val >= 0 ? '+' : '') + '$' + Math.abs(val).toFixed(2);
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('fr-CA', { weekday:'short', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function formatDateShort(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('fr-CA', { day:'numeric', month:'short', year:'numeric' });
  }

  // ===== AUTO-COMPLETE SESSIONS PASSÉES =====
  async function autoCompletePastSessions() {
    const now = new Date();
    const snap = await getDocs(query(
      collection(db, 'sessions'),
      where('status', 'in', ['open', 'closed'])
    ));
    for (const d of snap.docs) {
      const s = d.data();
      const sessionDate = s.date?.toDate?.();
      if (sessionDate && sessionDate < now) {
        await updateDoc(doc(db, 'sessions', d.id), { status: 'completed' });
      }
    }
  }

  // ===== SESSIONS VIEW =====
  // ===== SESSIONS TEMPS RÉEL =====
  let sessionsUnsubscribe = null;
  let regUnsubscribers = {};

  window.loadSessions = () => {
    const container = document.getElementById('sessions-list');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement...</div>';

    // Annuler les anciens listeners
    if (sessionsUnsubscribe) sessionsUnsubscribe();
    Object.values(regUnsubscribers).forEach(u => u());
    regUnsubscribers = {};

    const filterVal = document.getElementById('sessions-filter').value;
    let q;
    if (filterVal === 'upcoming') {
      // "À venir" = upcoming + open + closed (pas encore passées)
      q = query(collection(db, 'sessions'), where('status', 'in', ['upcoming','open','closed']), orderBy('date'));
    } else if (filterVal === 'completed') {
      q = query(collection(db, 'sessions'), where('status', 'in', ['completed','cancelled']), orderBy('date', 'desc'));
    } else {
      q = query(collection(db, 'sessions'), orderBy('date', 'desc'));
    }

    // Cache des inscriptions par session
    const regCache = {};
    // Cache des sessions
    const sessionCache = {};

    function renderAll() {
      const sessionIds = Object.keys(sessionCache);
      if (sessionIds.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">🏓</div><p>Aucune session pour l\'instant.</p></div>';
        return;
      }
      container.innerHTML = '';
      // Trier par date
      const sorted = sessionIds
        .map(id => ({ id, ...sessionCache[id] }))
        .sort((a, b) => {
          const da = a.date?.toDate?.() || new Date(0);
          const db2 = b.date?.toDate?.() || new Date(0);
          return filterVal === 'completed' ? db2 - da : da - db2;
        });

      for (const s of sorted) {
        const sId = s.id;
        const regs = regCache[sId] || [];
        const confirmed = regs.filter(d => d.status === 'confirmed');
        const waitlist = regs.filter(d => d.status === 'waitlist');
        const myReg = regs.find(d => d.userId === currentUser.uid && d.status !== 'cancelled');
        const wasCharged = regs.some(d => d.userId === currentUser.uid && d.charged === true);

        const filledPct = Math.min(100, (confirmed.length / s.maxPlayers) * 100);
        const isFull = confirmed.length >= s.maxPlayers;
        const isOpen = s.status === 'open';
        const amConfirmed = myReg && myReg.status === 'confirmed';
        const amWaitlist = myReg && myReg.status === 'waitlist';

        const statusLabels = { open: 'Inscriptions ouvertes', upcoming: 'Bientôt', closed: 'Fermé', completed: 'Terminé', cancelled: '❌ Annulée' };

        const div = document.createElement('div');
        div.className = `session-card ${s.status}`;
        if (s.status === 'cancelled') div.style.borderColor = 'var(--red-dark)';
        if (s.status === 'closed') div.style.cssText += '; border-left-color: var(--muted)';
        div.innerHTML = `
          <div class="session-header">
            <div>
              <div class="session-title">${s.title}</div>
              <div style="font-size:0.82rem;color:var(--muted);margin-top:0.25rem">${formatDate(s.date)}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
              <span class="tag tag-status-${s.status}">${statusLabels[s.status] || s.status}</span>
              ${amConfirmed ? '<span class="tag tag-registered">✓ Inscrit</span>' : ''}
              ${amWaitlist ? '<span class="tag tag-waitlist">⏳ Liste d\'attente</span>' : ''}
            </div>
          </div>
          <div class="session-meta">
            <span class="tag tag-location">📍 ${s.location}</span>
            <span class="tag tag-cost">${s.cost === 0 ? 'Gratuit' : s.cost + '$'}</span>
            ${waitlist.length > 0 ? `<span class="tag tag-waitlist">${waitlist.length} en attente</span>` : ''}
          </div>
          <div class="spots-bar">
            <div class="spots-track">
              <div class="spots-fill ${filledPct >= 100 ? '' : filledPct >= 75 ? 'almost' : 'available'}" style="width:${filledPct}%"></div>
            </div>
            <span class="spots-text">${confirmed.length}/${s.maxPlayers} joueurs</span>
          </div>
          ${confirmed.length > 0 ? `
            <div class="players-grid" style="margin-top:0.75rem">
              ${confirmed.map(p => `
                <div class="player-chip">
                  ${p.userPhoto ? `<img src="${p.userPhoto}" class="player-chip-avatar" />` : `<div class="player-chip-avatar" style="background:var(--red-dark)"></div>`}
                  <span class="player-chip-name">${p.userName}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
          ${waitlist.length > 0 ? `
            <div style="margin-top:0.5rem">
              <div style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem">Liste d'attente</div>
              <div class="players-grid">
                ${waitlist.map((p, i) => `
                  <div class="player-chip waitlist">
                    <span style="color:var(--amber);font-size:0.75rem;font-weight:700">#${i+1}</span>
                    <span class="player-chip-name">${p.userName}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          ${s.notes ? `<div style="margin-top:0.75rem;font-size:0.85rem;color:var(--muted);padding-top:0.75rem;border-top:1px solid var(--border)">${s.notes}</div>` : ''}
          ${isOpen ? renderSessionActions(sId, s, myReg ? {id: myReg._id, data: () => myReg} : null, isFull, amConfirmed, amWaitlist, wasCharged) : ''}
        `;
        container.appendChild(div);
      }
    }

    // Listener sessions
    sessionsUnsubscribe = onSnapshot(q, (snap) => {
      if (snap.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">🏓</div><p>Aucune session pour l\'instant.</p></div>';
        return;
      }
      snap.docs.forEach(d => { sessionCache[d.id] = d.data(); });
      // Supprimer les sessions qui ne sont plus dans la requête
      const currentIds = snap.docs.map(d => d.id);
      Object.keys(sessionCache).forEach(id => { if (!currentIds.includes(id)) delete sessionCache[id]; });

      // Écouter les inscriptions pour chaque session
      snap.docs.forEach(sessionDoc => {
        const sId = sessionDoc.id;
        if (!regUnsubscribers[sId]) {
          const regQ = query(collection(db, 'registrations'), where('sessionId', '==', sId));
          regUnsubscribers[sId] = onSnapshot(regQ, (regSnap) => {
            regCache[sId] = regSnap.docs.map(d => ({...d.data(), _id: d.id}));
            renderAll();
          });
        }
      });
      renderAll();
    });
  };

  function renderSessionActions(sId, s, myReg, isFull, amConfirmed, amWaitlist, wasCharged) {
    if (!myReg) {
      const label = isFull ? "S'inscrire (liste d'attente)" : (wasCharged ? '↩ Me réinscrire' : "S'inscrire");
      const btnClass = isFull ? 'btn-ghost' : 'btn-primary';
      const balanceOk = (currentUserData?.balance || 0) >= s.cost || wasCharged;
      const showWarning = !balanceOk && s.cost > 0;
      return `
        <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
          ${showWarning ? `<span style="font-size:0.8rem;color:var(--red)">⚠ Solde insuffisant</span>` : ''}
          <button class="btn ${btnClass} btn-sm" onclick="registerForSession('${sId}', ${s.cost})" ${!balanceOk && s.cost > 0 ? 'disabled' : ''}>
            ${label}
          </button>
        </div>
      `;
    } else if (amConfirmed) {
      const myRegId = myReg._id || myReg.id;
      return `
        <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);display:flex;gap:0.5rem">
          <button class="btn btn-danger btn-sm" onclick="cancelRegistration('${myRegId}', '${sId}', ${s.cost})">
            Annuler mon inscription
          </button>
        </div>
      `;
    } else if (amWaitlist) {
      const myRegId = myReg._id || myReg.id;
      return `
        <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);display:flex;gap:0.5rem">
          <button class="btn btn-ghost btn-sm" onclick="cancelRegistration('${myRegId}', '${sId}', 0)">
            Retirer de la liste d'attente
          </button>
        </div>
      `;
    }
    return '';
  }

  // ===== INSCRIPTION =====
  window.registerForSession = async (sessionId, cost) => {
    if (!currentUser) return;

    // Re-vérifier solde
    const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
    const userData = userSnap.data();
    if (cost > 0 && userData.balance < cost) {
      toast('Solde insuffisant pour cette session.', 'error');
      return;
    }

    try {
      await runTransaction(db, async (tx) => {
        const sessionRef = doc(db, 'sessions', sessionId);
        const sessionSnap = await tx.get(sessionRef);
        const s = sessionSnap.data();
        if (s.status !== 'open') throw new Error('Les inscriptions sont fermées.');

        // Compter les confirmés
        const regQuery = query(
          collection(db, 'registrations'),
          where('sessionId', '==', sessionId),
          where('status', '==', 'confirmed')
        );
        const regSnap = await getDocs(regQuery);
        const confirmedCount = regSnap.size;

        // Vérifier pas déjà inscrit
        const myRegQuery = query(
          collection(db, 'registrations'),
          where('sessionId', '==', sessionId),
          where('userId', '==', currentUser.uid)
        );
        const myRegSnap = await getDocs(myRegQuery);
        const activeReg = myRegSnap.docs.find(d => d.data().status !== 'cancelled');
        if (activeReg) throw new Error('Déjà inscrit à cette session.');
        const alreadyCharged = myRegSnap.docs.some(d => d.data().charged === true);

        const isFull = confirmedCount >= s.maxPlayers;

        const allRegQuery = query(
          collection(db, 'registrations'),
          where('sessionId', '==', sessionId)
        );
        const allRegSnap = await getDocs(allRegQuery);
        const position = allRegSnap.size + 1;

        const status = isFull ? 'waitlist' : 'confirmed';
        const willCharge = status === 'confirmed' && cost > 0 && !alreadyCharged;

        const newReg = {
          sessionId,
          userId: currentUser.uid,
          userEmail: currentUser.email,
          userName: currentUser.displayName,
          userPhoto: currentUser.photoURL || null,
          status,
          position,
          registeredAt: serverTimestamp(),
          cancelledAt: null,
          chargedAt: willCharge ? serverTimestamp() : null,
          charged: willCharge
        };

        const newRegRef = doc(collection(db, 'registrations'));
        tx.set(newRegRef, newReg);

        // ===== DÉBIT AUTOMATIQUE À L'INSCRIPTION =====
        if (willCharge) {
          const userRef = doc(db, 'users', currentUser.uid);
          tx.update(userRef, { balance: increment(-cost) });

          const txRef = doc(collection(db, 'transactions'));
          tx.set(txRef, {
            userId: currentUser.uid,
            sessionId,
            type: 'debit',
            amount: -cost,
            description: `Inscription: ${s.title}`,
            createdAt: serverTimestamp(),
            createdBy: 'system'
          });
        }
      });

      // Refresh solde + sessions
      currentUserData = (await getDoc(doc(db, 'users', currentUser.uid))).data();
      updateNavBalance(currentUserData.balance);
      loadSessions();

      const isFull = (await getDocs(query(
        collection(db, 'registrations'),
        where('sessionId', '==', sessionId),
        where('status', '==', 'confirmed')
      ))).size > 0;

      toast(
        cost > 0 && !isFull
          ? `Inscription confirmée! -${cost}$ débité. 🎉`
          : `Ajouté à la liste d'attente!`,
        'success'
      );

    } catch (e) {
      toast(e.message, 'error');
    }
  };

  // ===== ANNULATION =====
  window.cancelRegistration = (regId, sessionId, cost) => {
    confirm('Annuler ton inscription?', 'Si les inscriptions sont encore ouvertes, tu seras remboursé automatiquement.', async () => {
      try {
        const regSnap = await getDoc(doc(db, 'registrations', regId));
        const regData = regSnap.data();
        const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
        const sessionData = sessionSnap.data();

        await updateDoc(doc(db, 'registrations', regId), {
          status: 'cancelled',
          cancelledAt: serverTimestamp()
        });

        // Remboursement automatique si session encore ouverte et joueur avait payé
        if (regData.charged && sessionData.cost > 0 && sessionData.status === 'open') {
          await runTransaction(db, async (tx) => {
            tx.update(doc(db, 'users', currentUser.uid), { balance: increment(sessionData.cost) });
            const txRef = doc(collection(db, 'transactions'));
            tx.set(txRef, {
              userId: currentUser.uid,
              sessionId,
              type: 'credit',
              amount: sessionData.cost,
              description: `Remboursement annulation: ${sessionData.title}`,
              createdAt: serverTimestamp(),
              createdBy: 'system'
            });
          });
          toast(`Inscription annulée — ${sessionData.cost}$ remboursé. `, 'success');
        } else {
          toast('Inscription annulée.', 'success');
        }

        await promoteWaitlist(sessionId);
        currentUserData = (await getDoc(doc(db, 'users', currentUser.uid))).data();
        updateNavBalance(currentUserData.balance);
      } catch(e) {
        toast(e.message, 'error');
      }
    });
  };

  async function promoteWaitlist(sessionId) {
    // Compter les confirmés
    const confSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('sessionId', '==', sessionId),
      where('status', '==', 'confirmed')
    ));
    
    const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
    const s = sessionSnap.data();
    
    // Règle impair: si impair à la fermeture, 1 place reste ouverte
    // On vérifie le statut
    if (s.status !== 'open') {
      // Session fermée: pas de promotion auto (ou on le fait quand même)
    }

    const maxPlayers = s.maxPlayers;
    if (confSnap.size >= maxPlayers) return; // déjà plein

    // Trouver le premier de la liste d'attente
    const waitSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('sessionId', '==', sessionId),
      where('status', '==', 'waitlist'),
      orderBy('registeredAt')
    ));

    if (waitSnap.empty) return;

    const first = waitSnap.docs[0];
    await updateDoc(doc(db, 'registrations', first.id), {
      status: 'confirmed'
    });

    toast(`${first.data().userName} promu depuis la liste d'attente!`, 'success');
  }

  // ===== PROFILE =====
  window.loadProfile = async () => {
    if (!currentUser) return;
    
    const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
    const userData = userSnap.data();
    currentUserData = userData;

    const bal = userData.balance || 0;
    const balEl = document.getElementById('profile-balance');
    balEl.textContent = formatCurrency(bal);
    balEl.className = 'balance-amount' + (bal < 0 ? ' negative' : bal === 0 ? ' zero' : '');

    document.getElementById('profile-name').textContent = userData.displayName;
    document.getElementById('profile-email').textContent = userData.email;
    updateNavBalance(bal);

    // Transactions
    const txSnap = await getDocs(query(
      collection(db, 'transactions'),
      where('userId', '==', currentUser.uid),
      orderBy('createdAt', 'desc')
    ));

    const tbody = document.getElementById('profile-tx-body');
    if (txSnap.empty) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty" style="padding:1rem;text-align:center;color:var(--muted)">Aucune transaction</td></tr>';
    } else {
      tbody.innerHTML = txSnap.docs.map(d => {
        const tx = d.data();
        const amt = tx.amount;
        return `<tr>
          <td style="color:var(--muted);white-space:nowrap">${formatDateShort(tx.createdAt)}</td>
          <td>${tx.description}</td>
          <td class="${amt < 0 ? 'tx-debit' : 'tx-credit'}">${formatCurrency(amt)}</td>
        </tr>`;
      }).join('');
    }

    // Mes inscriptions
    const myRegSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('userId', '==', currentUser.uid),
      orderBy('registeredAt', 'desc')
    ));
    
    const regContainer = document.getElementById('profile-registrations');
    if (myRegSnap.empty) {
      regContainer.innerHTML = '<div class="empty"><p style="color:var(--muted)">Aucune inscription.</p></div>';
    } else {
      regContainer.innerHTML = '';
      for (const regDoc of myRegSnap.docs) {
        const r = regDoc.data();
        const sessionSnap = await getDoc(doc(db, 'sessions', r.sessionId));
        const s = sessionSnap.data();
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600">${s?.title || 'Session supprimée'}</div>
              <div style="font-size:0.82rem;color:var(--muted)">${s ? formatDateShort(s.date) : ''}</div>
            </div>
            <span class="tag ${r.status === 'confirmed' ? 'tag-registered' : r.status === 'waitlist' ? 'tag-waitlist' : 'tag-status-closed'}">
              ${r.status === 'confirmed' ? '✓ Confirmé' : r.status === 'waitlist' ? '⏳ Attente' : 'Annulé'}
            </span>
          </div>
        `;
        regContainer.appendChild(div);
      }
    }
  };

  // ===== ADMIN =====
  window.showAdminTab = (tab) => {
    ['sessions','users','waitlist'].forEach(t => {
      document.getElementById(`admin-tab-${t}`).style.display = t === tab ? 'block' : 'none';
      document.querySelectorAll('.admin-tab')[['sessions','users','waitlist'].indexOf(t)].classList.toggle('active', t === tab);
    });
    if (tab === 'users') loadAdminUsers();
    if (tab === 'waitlist') loadAdminWaitlist();
  };

  window.loadAdmin = async () => {
    loadAdminSessions();
  };

  let adminSessionsUnsubscribe = null;

  async function loadAdminSessions() {
    const container = document.getElementById('admin-sessions-list');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    if (adminSessionsUnsubscribe) adminSessionsUnsubscribe();

    const q = query(collection(db, 'sessions'), orderBy('date', 'desc'));

    adminSessionsUnsubscribe = onSnapshot(q, async (snap) => {
      if (snap.empty) {
        container.innerHTML = '<div class="empty">Aucune session créée.</div>';
        return;
      }
      container.innerHTML = '';
      for (const d of snap.docs) {
        const s = d.data();
        const regSnap = await getDocs(query(collection(db, 'registrations'), where('sessionId', '==', d.id)));
        const confirmed = regSnap.docs.filter(r => r.data().status === 'confirmed').length;
        const waitlist = regSnap.docs.filter(r => r.data().status === 'waitlist').length;

        const statusLabels = { upcoming: 'Bientôt', open: 'Ouvert', closed: 'Fermé', completed: 'Terminé', cancelled: '❌ Annulée' };
        const isCancelled = s.status === 'cancelled';

        const div = document.createElement('div');
        div.className = 'card';
        if (isCancelled) div.style.borderColor = 'var(--red-dark)';
        div.innerHTML = `
          <div class="card-header">
            <div>
              <div style="font-family:var(--font-display);font-weight:700;font-size:1.1rem">${s.title}</div>
              <div style="font-size:0.82rem;color:var(--muted)">${formatDate(s.date)} — ${s.location}</div>
            </div>
            <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
              <span class="tag tag-status-${s.status}">${statusLabels[s.status] || s.status}</span>
              <span class="tag tag-cost">${confirmed}/${s.maxPlayers} 🟢 ${waitlist > 0 ? waitlist + ' ⏳' : ''}</span>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            ${!isCancelled ? `
              <button class="btn btn-secondary btn-sm" onclick="openSessionModal('${d.id}')">Modifier</button>
              <button class="btn btn-sm btn-secondary" onclick="changeSessionStatus('${d.id}', '${s.status}')">Statut</button>
              <button class="btn btn-success btn-sm" onclick="chargeSession('${d.id}')">Débiter joueurs</button>
              <button class="btn btn-primary btn-sm" onclick="openManageRegistrationsModal('${d.id}', '${s.title.replace(/'/g,"\\'")}')">👥 Inscriptions</button>
              <button class="btn btn-danger btn-sm" onclick="cancelSession('${d.id}', '${s.title.replace(/'/g,"\\'")}')">❌ Annuler session</button>

            <button class="btn btn-ghost btn-sm" onclick="deleteSession('${d.id}', '${s.title.replace(/'/g,"\\'")}')">🗑 Supprimer</button>
          </div>
        `;
        container.appendChild(div);
      }
    });
  }

  async function loadAdminWaitlist() {

    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      collection(db, 'registrations'),

    ));

                  <button class="btn btn-success btn-sm" onclick="promoteManual('${r._id}', '${sId}')">Promouvoir</button>

    }
  }

  // ===== ADMIN ACTIONS =====
  window.changeSessionStatus = (sessionId, currentStatus) => {
    const statuses = ['upcoming', 'open', 'closed', 'completed'];
    const next = statuses[(statuses.indexOf(currentStatus) + 1) % statuses.length];
    confirm(`Changer le statut à "${next}"?`, '', async () => {
      await updateDoc(doc(db, 'sessions', sessionId), { status: next });
      toast(`Statut changé: ${next}`, 'success');
      loadAdminSessions();
    });
  };

  window.cancelSession = (sessionId, sessionTitle) => {
    confirm(`Annuler la session "${sessionTitle}"?`, 'Tous les joueurs inscrits seront remboursés automatiquement.', async () => {
      const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
      const s = sessionSnap.data();

      // Rembourser tous les joueurs confirmés qui ont payé
      const regSnap = await getDocs(query(
        collection(db, 'registrations'),
        where('sessionId', '==', sessionId),
        where('status', '==', 'confirmed'),
        where('charged', '==', true)
      ));

      for (const regDoc of regSnap.docs) {
        const r = regDoc.data();
        await runTransaction(db, async (tx) => {
          tx.update(doc(db, 'users', r.userId), { balance: increment(s.cost) });
          tx.update(regDoc.ref, { status: 'cancelled', cancelledAt: serverTimestamp() });
          const txRef = doc(collection(db, 'transactions'));
          tx.set(txRef, {
            userId: r.userId, sessionId,
            type: 'credit', amount: s.cost,
            description: `Remboursement — session annulée: ${s.title}`,
            createdAt: serverTimestamp(), createdBy: currentUser.uid
          });
        });
      }

      // Annuler aussi les inscriptions non payées et liste d'attente
      const otherRegSnap = await getDocs(query(
        collection(db, 'registrations'),
        where('sessionId', '==', sessionId),
        where('status', 'in', ['confirmed', 'waitlist'])
      ));
      for (const regDoc of otherRegSnap.docs) {
        await updateDoc(regDoc.ref, { status: 'cancelled', cancelledAt: serverTimestamp() });
      }

      await updateDoc(doc(db, 'sessions', sessionId), { status: 'cancelled' });
      toast(`Session annulée — ${regSnap.size} joueur(s) remboursé(s).`, 'success');
      loadAdminSessions();
    });
  };

  window.deleteSession = (sessionId, sessionTitle) => {
    confirm(`Supprimer définitivement "${sessionTitle}"?`, '⚠️ Cette action est irréversible. Les inscriptions associées seront aussi supprimées.', async () => {
      const regSnap = await getDocs(query(collection(db, 'registrations'), where('sessionId', '==', sessionId)));
      for (const regDoc of regSnap.docs) {
        await deleteDoc(regDoc.ref);
      }
      await deleteDoc(doc(db, 'sessions', sessionId));
      toast('Session supprimée.', 'success');
    });
  };

  window.chargeSession = async (sessionId) => {
    confirm('Débiter tous les joueurs confirmés?', 'Un débit sera appliqué à chaque joueur confirmé non encore débité.', async () => {
      const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
      const s = sessionSnap.data();
      if (s.cost === 0) { toast('Session gratuite, aucun débit.', 'success'); return; }

      const regSnap = await getDocs(query(
        collection(db, 'registrations'),
        where('sessionId', '==', sessionId),
        where('status', '==', 'confirmed'),
        where('charged', '==', false)
      ));

      let count = 0;
      for (const regDoc of regSnap.docs) {
        const r = regDoc.data();
        await runTransaction(db, async (tx) => {
          const userRef = doc(db, 'users', r.userId);
          tx.update(userRef, { balance: increment(-s.cost) });
          tx.update(doc(db, 'registrations', regDoc.id), { charged: true, chargedAt: serverTimestamp() });
          const txRef = doc(collection(db, 'transactions'));
          tx.set(txRef, {
            userId: r.userId,
            sessionId,
            type: 'debit',
            amount: -s.cost,
            description: `Session : ${s.title}`,
            createdAt: serverTimestamp(),
            createdBy: 'system'
          });
        });
        count++;
      }
      toast(`${count} joueur(s) débité(s).`, 'success');
      loadAdminSessions();
    });
  };

  window.promoteManual = async (regId, sessionId) => {
    await updateDoc(doc(db, 'registrations', regId), { status: 'confirmed' });
    toast('Joueur promu!', 'success');
    loadAdminWaitlist();
  };

  // ===== SESSION MODAL =====
  window.openSessionModal = async (sessionId = null) => {
    editingSessionId = sessionId;
    document.getElementById('modal-session-title').textContent = sessionId ? 'Modifier la session' : 'Nouvelle session';
    
    if (sessionId) {
      const snap = await getDoc(doc(db, 'sessions', sessionId));
      const s = snap.data();
      document.getElementById('s-title').value = s.title;
      document.getElementById('s-location').value = s.location;
      document.getElementById('s-cost').value = s.cost;
      document.getElementById('s-max').value = s.maxPlayers;
      document.getElementById('s-notes').value = s.notes || '';
      if (s.date) {
        const d = s.date.toDate();
        document.getElementById('s-date').value = d.toISOString().slice(0,16);
      }
    } else {
      document.getElementById('s-title').value = 'Pickleball Madness';
      document.getElementById('s-cost').value = '5';
      document.getElementById('s-max').value = '16';
      document.getElementById('s-notes').value = '';
    }
    openModal('modal-session');
  };

  window.updateCostFromLocation = () => {
    const loc = document.getElementById('s-location').value;
    if (loc.includes('Sportplex')) document.getElementById('s-cost').value = '5';
    else if (loc.includes('ZAC')) document.getElementById('s-cost').value = '10';
    else document.getElementById('s-cost').value = '0';
  };

  window.saveSession = async () => {
    const title = document.getElementById('s-title').value.trim();
    const dateVal = document.getElementById('s-date').value;
    const location = document.getElementById('s-location').value;
    const cost = parseInt(document.getElementById('s-cost').value);
    const maxPlayers = parseInt(document.getElementById('s-max').value);
    const notes = document.getElementById('s-notes').value.trim();

    if (!title || !dateVal) { toast('Titre et date requis.', 'error'); return; }

    const sessionDate = new Date(dateVal);
    
    // Calculer ouverture/fermeture automatique (vendredi précédent/suivant à 9h)
    const registrationClosesAt = getNextFriday9h(sessionDate);
    const registrationOpensAt = getPreviousFriday9h(registrationClosesAt);

    const data = {
      title, location, cost, maxPlayers, notes,
      date: Timestamp.fromDate(sessionDate),
      registrationOpensAt: Timestamp.fromDate(registrationOpensAt),
      registrationClosesAt: Timestamp.fromDate(registrationClosesAt),
      status: 'upcoming'
    };

    if (editingSessionId) {
      await updateDoc(doc(db, 'sessions', editingSessionId), data);
      toast('Session modifiée!', 'success');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'sessions'), data);
      toast('Session créée!', 'success');
    }

    closeModal('modal-session');
    loadAdminSessions();
  };

  function getNextFriday9h(fromDate) {
    const d = new Date(fromDate);
    // Trouve le vendredi de la même semaine ou avant
    const day = d.getDay(); // 0=dim, 5=ven
    const daysToFriday = (5 - day + 7) % 7;
    d.setDate(d.getDate() - (day === 5 ? 0 : (day > 5 ? day - 5 : 7 - (5 - day))));
    d.setHours(9, 0, 0, 0);
    return d;
  }

  function getPreviousFriday9h(fromDate) {
    const d = new Date(fromDate);
    d.setDate(d.getDate() - 7);
    d.setHours(9, 0, 0, 0);
    return d;
  }

  // ===== ADMIN GÉRER INSCRIPTIONS =====
  window.openManageRegistrationsModal = async (sessionId, sessionTitle) => {
    document.getElementById('manage-regs-session-id').value = sessionId;
    document.getElementById('modal-manage-regs-title').textContent = `Inscriptions — ${sessionTitle}`;
    document.getElementById('manage-regs-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    openModal('modal-manage-regs');

    // Charger tous les joueurs pour le select
    const usersSnap = await getDocs(query(collection(db, 'users'), orderBy('displayName')));
    const select = document.getElementById('manage-regs-player-select');
    select.innerHTML = '<option value="">Sélectionner un joueur...</option>';
    usersSnap.docs.forEach(d => {
      const u = d.data();
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = `${u.displayName} (${formatCurrency(u.balance || 0)})`;
      select.appendChild(opt);
    });

    await refreshManageRegsList(sessionId);
  };

  async function refreshManageRegsList(sessionId) {
    const container = document.getElementById('manage-regs-list');
    const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
    const s = sessionSnap.data();

    const regSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('sessionId', '==', sessionId)
    ));

    const active = regSnap.docs.filter(d => d.data().status !== 'cancelled');
    const confirmed = active.filter(d => d.data().status === 'confirmed');
    const waitlist = active.filter(d => d.data().status === 'waitlist');

    if (active.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:0.9rem">Aucune inscription.</p>';
      return;
    }

    container.innerHTML = `
      <div style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">
        Confirmés (${confirmed.length}/${s.maxPlayers})
      </div>
      <div style="display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem">
        ${confirmed.map(d => {
          const r = d.data();
          return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:0.5rem 0.75rem">
            <span style="font-weight:500">${r.userName}</span>
            <button class="btn btn-danger btn-sm" onclick="adminCancelPlayer('${d.id}', '${sessionId}', ${s.cost}, ${r.charged})">Annuler</button>
          </div>`;
        }).join('')}
      </div>
      ${waitlist.length > 0 ? `
        <div style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">
          Liste d'attente (${waitlist.length})
        </div>
        <div style="display:flex;flex-direction:column;gap:0.4rem">
          ${waitlist.map((d, i) => {
            const r = d.data();
            return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:0.5rem 0.75rem">
              <span style="color:var(--amber);font-weight:700;margin-right:0.5rem">#${i+1}</span>
              <span style="font-weight:500;flex:1">${r.userName}</span>
              <div style="display:flex;gap:0.4rem">
                <button class="btn btn-success btn-sm" onclick="promoteManual('${d.id}', '${sessionId}')">↑ Confirmer</button>
                <button class="btn btn-danger btn-sm" onclick="adminCancelPlayer('${d.id}', '${sessionId}', 0, false)">Retirer</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      ` : ''}
    `;
  }

  window.adminRegisterPlayer = async () => {
    const sessionId = document.getElementById('manage-regs-session-id').value;
    const uid = document.getElementById('manage-regs-player-select').value;
    if (!uid) { toast('Sélectionne un joueur.', 'error'); return; }

    const sessionSnap = await getDoc(doc(db, 'sessions', sessionId));
    const s = sessionSnap.data();

    const userSnap = await getDoc(doc(db, 'users', uid));
    const u = userSnap.data();

    // Vérifier si déjà inscrit
    const existingSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('sessionId', '==', sessionId),
      where('userId', '==', uid)
    ));
    const alreadyActive = existingSnap.docs.find(d => d.data().status !== 'cancelled');
    if (alreadyActive) { toast('Ce joueur est déjà inscrit.', 'error'); return; }
    const alreadyCharged = existingSnap.docs.some(d => d.data().charged === true);

    // Compter les confirmés
    const confSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('sessionId', '==', sessionId),
      where('status', '==', 'confirmed')
    ));
    const isFull = confSnap.size >= s.maxPlayers;
    const status = isFull ? 'waitlist' : 'confirmed';
    const willCharge = status === 'confirmed' && s.cost > 0 && !alreadyCharged;

    if (willCharge && u.balance < s.cost) {
      toast(`Solde insuffisant pour ${u.displayName} (${formatCurrency(u.balance)}).`, 'error');
      return;
    }

    await runTransaction(db, async (tx) => {
      const newRegRef = doc(collection(db, 'registrations'));
      tx.set(newRegRef, {
        sessionId, userId: uid,
        userEmail: u.email, userName: u.displayName,
        userPhoto: u.photoURL || null,
        status, position: confSnap.size + 1,
        registeredAt: serverTimestamp(),
        cancelledAt: null,
        chargedAt: willCharge ? serverTimestamp() : null,
        charged: willCharge
      });
      if (willCharge) {
        tx.update(doc(db, 'users', uid), { balance: increment(-s.cost) });
        const txRef = doc(collection(db, 'transactions'));
        tx.set(txRef, {
          userId: uid, sessionId,
          type: 'debit', amount: -s.cost,
          description: `Inscription admin: ${s.title}`,
          createdAt: serverTimestamp(), createdBy: currentUser.uid
        });
      }
    });

    toast(`${u.displayName} inscrit${status === 'waitlist' ? ' (liste d\'attente)' : ''}!`, 'success');
    await refreshManageRegsList(sessionId);
  };

  window.adminCancelPlayer = async (regId, sessionId, cost, charged) => {
    await updateDoc(doc(db, 'registrations', regId), {
      status: 'cancelled', cancelledAt: serverTimestamp()
    });
    await promoteWaitlist(sessionId);
    toast('Inscription annulée.', 'success');
    await refreshManageRegsList(sessionId);
  };

  // ===== RENAME PLAYER =====
  window.openRenameModal = (uid, currentName) => {
    document.getElementById('rename-uid').value = uid;
    document.getElementById('rename-value').value = currentName;
    openModal('modal-rename');
  };

  window.applyRename = async () => {
    const uid = document.getElementById('rename-uid').value;
    const newName = document.getElementById('rename-value').value.trim();
    if (!newName) { toast('Nom requis.', 'error'); return; }

    // Mettre à jour le doc user
    await updateDoc(doc(db, 'users', uid), { displayName: newName });

    // Mettre à jour aussi les inscriptions existantes
    const regSnap = await getDocs(query(
      collection(db, 'registrations'),
      where('userId', '==', uid),
      where('status', 'in', ['confirmed', 'waitlist'])
    ));
    for (const regDoc of regSnap.docs) {
      await updateDoc(doc(db, 'registrations', regDoc.id), { userName: newName });
    }

    toast(`Nom changé pour "${newName}"`, 'success');
    closeModal('modal-rename');
    loadAdminUsers();
  };

  // ===== BALANCE MODAL =====
  window.openBalanceModal = (uid, name, currentBalance) => {
    document.getElementById('balance-uid').value = uid;
    document.getElementById('balance-user-name').value = `${name} (solde actuel: ${formatCurrency(currentBalance)})`;
    document.getElementById('balance-amount').value = '';
    document.getElementById('balance-desc').value = '';
    openModal('modal-balance');
  };

  window.applyBalanceAdjustment = async () => {
    const uid = document.getElementById('balance-uid').value;
    const amount = parseFloat(document.getElementById('balance-amount').value);
    const description = document.getElementById('balance-desc').value.trim();

    if (isNaN(amount) || amount === 0) { toast('Montant invalide.', 'error'); return; }
    if (!description) { toast('Description requise.', 'error'); return; }

    await runTransaction(db, async (tx) => {
      tx.update(doc(db, 'users', uid), { balance: increment(amount) });
      const txRef = doc(collection(db, 'transactions'));
      tx.set(txRef, {
        userId: uid,
        sessionId: null,
        type: amount > 0 ? 'credit' : 'debit',
        amount,
        description,
        createdAt: serverTimestamp(),
        createdBy: currentUser.uid
      });
    });

    toast(`Ajustement appliqué: ${formatCurrency(amount)}`, 'success');
    closeModal('modal-balance');
    loadAdminUsers();
  };

  // ===== MODAL HELPERS =====
  window.openModal = (id) => document.getElementById(id).classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');

  let confirmCallback = null;
  window.confirm = (title, message, callback) => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-message').textContent = message;
    confirmCallback = callback;
    openModal('modal-confirm');
  };

  document.getElementById('confirm-action-btn').onclick = () => {
    closeModal('modal-confirm');
    if (confirmCallback) confirmCallback();
  };

  // ===== TOAST =====
  let toastTimeout;
  window.toast = (message, type = '') => {
    const el = document.getElementById('toast');
    el.textContent = message;
    el.className = `show${type ? ' toast-' + type : ''}`;
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { el.className = ''; }, 3500);
  };

  // Fermer modals en cliquant backdrop
  document.querySelectorAll('.modal-backdrop').forEach(bd => {
    bd.addEventListener('click', (e) => {
      if (e.target === bd) closeModal(bd.id);
    });
  });

  // ===== PULL TO REFRESH =====
  let pullStartY = 0;
  let pulling = false;
  let indicator = null;

  function createIndicator() {
    indicator = document.createElement('div');
    indicator.id = 'ptr-indicator';
    indicator.style.cssText = `
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.4rem 1rem;
      font-family: var(--font-display); font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
      z-index: 99; display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    `;
    document.body.appendChild(indicator);
  }
  createIndicator();

  document.addEventListener('touchstart', (e) => {
    if (window.scrollY === 0) {
      pullStartY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dist = e.touches[0].clientY - pullStartY;
    if (dist > 10) {
      const pct = Math.min(dist / 80, 1);
      indicator.style.opacity = pct;
      indicator.innerHTML = dist > 70 ? '↑ Relâcher pour rafraîchir' : '↓ Tirer pour rafraîchir';
      indicator.style.color = dist > 70 ? 'var(--red)' : 'var(--muted)';
    }
  }, { passive: true });

  document.addEventListener('touchend', async (e) => {
    if (!pulling) return;
    const dist = e.changedTouches[0].clientY - pullStartY;
    pulling = false;
    if (dist > 70) {
      indicator.innerHTML = '↻ Rafraîchissement...';
      indicator.style.color = 'var(--green)';
      indicator.style.opacity = '1';
      // Refresh la vue active
      const activeView = document.querySelector('.view.active')?.id?.replace('view-', '');
      if (activeView === 'sessions') await loadSessions();
      else if (activeView === 'profile') await loadProfile();
      else if (activeView === 'admin') await loadAdmin();
      currentUserData = (await getDoc(doc(db, 'users', currentUser.uid))).data();
      updateNavBalance(currentUserData.balance);
    }
    setTimeout(() => { indicator.style.opacity = '0'; }, 600);
  });
</script>
</body>
</html>
